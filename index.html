<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Prazos Processuais</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Calculadora de Prazos Processuais</h1>
        <div class="subtitle">CPC/2015 - TJES</div>
      </div>
    </header>

    <div class="tabs">
      <button class="tab active" data-view="calculo">Calcular</button>
      <button class="tab" data-view="config">Feriados</button>
      <button class="tab" data-view="historico">Historico</button>
    </div>

    <!-- TELA: CÁLCULO -->
    <div id="view-calculo" class="view active">
      <div class="form-grid">
        <div class="form-group">
          <label for="tipo-data">Tipo de data de entrada</label>
          <select id="tipo-data">
            <option value="disponibilizacao_djen">Disponibilizacao no DJEN</option>
            <option value="publicacao_djen">Publicacao no DJEN</option>
            <option value="prazo_direto">Data do evento (prazo direto)</option>
          </select>
          <span class="help" id="tipo-data-help">A data sera ajustada conforme as regras do DJEN (2 saltos de dia util)</span>
        </div>

        <div class="form-group">
          <label for="data-entrada">Data</label>
          <input type="date" id="data-entrada">
        </div>

        <div class="form-group">
          <label for="dias-prazo">Prazo</label>
          <input type="number" id="dias-prazo" value="15" min="1">
        </div>

        <div class="form-group">
          <label for="tipo-contagem">Tipo de contagem</label>
          <select id="tipo-contagem">
            <option value="dias_uteis">Dias uteis (CPC, art. 219)</option>
            <option value="dias_corridos">Dias corridos</option>
            <option value="meses">Meses (art. 132, CC)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="tribunal">Tribunal</label>
          <select id="tribunal">
            <option value="tjes">TJES - Tribunal de Justica do ES</option>
          </select>
        </div>

        <div class="form-group">
          <label for="municipio">Municipio da sede do juizo</label>
          <select id="municipio">
            <option value="vitoria-es">Vitoria/ES</option>
          </select>
        </div>

        <div class="form-group">
          <label for="multiplicador">Multiplicador de prazo</label>
          <select id="multiplicador">
            <option value="1">1x (padrao)</option>
            <option value="2">2x (Fazenda Publica / MP / Defensoria)</option>
            <option value="3">3x</option>
          </select>
        </div>

        <div class="form-group">
          <label for="descricao">Descricao (opcional)</label>
          <input type="text" id="descricao" placeholder="Ex: Recurso processo 0001234-56.2026">
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="btn-calcular">Calcular prazo</button>
      </div>

      <div id="resultado" class="resultado-container" style="margin-top: 24px;">
        <div class="resultado-destaque">
          <div class="data-vencimento" id="res-data"></div>
          <div class="dia-semana" id="res-dia-semana"></div>
          <div class="dias-contados" id="res-dias-contados"></div>
        </div>

        <div class="btn-group" style="margin-bottom: 16px;">
          <button class="btn btn-secondary btn-sm" id="btn-salvar">Salvar no historico</button>
          <button class="btn btn-secondary btn-sm" onclick="window.print()">Imprimir</button>
        </div>

        <div id="res-etapas" class="etapas"></div>
        <div id="res-parametros" class="parametros"></div>
        <div id="res-calendario" class="calendario"></div>
      </div>
    </div>

    <!-- TELA: CONFIGURAÇÃO -->
    <div id="view-config" class="view">
      <div class="config-section">
        <h3>Feriados carregados</h3>
        <div class="form-group" style="margin-bottom: 12px;">
          <label for="config-ano">Ano</label>
          <input type="number" id="config-ano" value="2026" style="width: 100px;">
        </div>
        <div class="feriado-lista" id="feriado-lista"></div>
      </div>

      <div class="config-section">
        <h3>Suspensoes por ato normativo</h3>
        <div id="suspensoes-lista"></div>
        <div class="suspensao-form">
          <div class="form-group">
            <label>Data inicio</label>
            <input type="date" id="susp-inicio">
          </div>
          <div class="form-group">
            <label>Data fim</label>
            <input type="date" id="susp-fim">
          </div>
          <div class="form-group full">
            <label>Descricao</label>
            <input type="text" id="susp-descricao" placeholder="Ex: Portaria TJES no X">
          </div>
          <div class="form-group full">
            <label>Fundamentacao</label>
            <input type="text" id="susp-fundamentacao" placeholder="Ex: Ato Normativo TJES no Y">
          </div>
          <div>
            <button class="btn btn-secondary btn-sm" id="btn-add-suspensao">Adicionar suspensao</button>
          </div>
        </div>
      </div>

      <div class="config-section">
        <h3>Exportar / Importar</h3>
        <div class="btn-group">
          <button class="btn btn-secondary btn-sm" id="btn-exportar">Exportar feriados (JSON)</button>
          <button class="btn btn-secondary btn-sm" id="btn-importar">Importar feriados (JSON)</button>
          <input type="file" id="importar-file" accept=".json" style="display: none;">
        </div>
      </div>
    </div>

    <!-- TELA: HISTÓRICO -->
    <div id="view-historico" class="view">
      <div class="form-grid" style="margin-bottom: 16px;">
        <div class="form-group">
          <label for="hist-filtro">Filtrar</label>
          <input type="text" id="hist-filtro" placeholder="Buscar por descricao ou data...">
        </div>
        <div class="form-group" style="justify-content: flex-end;">
          <button class="btn btn-danger btn-sm" id="btn-limpar-historico">Limpar historico</button>
        </div>
      </div>
      <div id="historico-lista"></div>
    </div>
  </div>

  <script src="js/easter.js"></script>
  <script src="js/holidays.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
